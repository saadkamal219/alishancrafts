services:
  - type: web
    name: alishan-moments-backend
    runtime: node
    plan: free                        # upgrade to "starter" to remove idle spin-down
    region: singapore                 # closest region to Bangladesh
    rootDir: .                        # deploy from the backend/ folder root in GitHub
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false                   # set manually in Render dashboard
      - key: BASE_URL
        sync: false                   # set to your Render service URL
      - key: PLATFORM_FEE
        value: "1"
      - key: SALES_PDF_PASSWORD
        sync: false                   # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false                   # set to your Vercel URL, e.g. https://alishan-crafts.vercel.app
      # Admin passwords — add one per username:
      # - key: ADMIN_PASSWORD_admin
      #   sync: false
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
